<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musify Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --bg: #050505; }
        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden;
        }
        .container {
            width: 100%; max-width: 400px; background: rgba(255,255,255,0.03);
            border-radius: 30px; border: 1px solid rgba(0,242,255,0.2);
            padding: 30px; box-shadow: 0 0 40px rgba(0,242,255,0.1);
            text-align: center; backdrop-filter: blur(10px);
        }
        h1 { color: var(--neon); text-shadow: 0 0 20px var(--neon); font-size: 32px; letter-spacing: 4px; margin-bottom: 5px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }
        .search-box {
            width: 100%; background: #111; border: 2px solid #222;
            padding: 18px; border-radius: 20px; color: white; margin-bottom: 20px;
            box-sizing: border-box; outline: none; font-size: 16px; transition: 0.3s;
        }
        .search-box:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,242,255,0.3); }
        .btn-search {
            background: linear-gradient(45deg, var(--neon), var(--pink));
            border: none; color: white; padding: 18px; border-radius: 20px;
            font-weight: bold; width: 100%; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(255,0,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MUSIFY</h1>
        <div class="subtitle">Next-Gen Telegram Player</div>
        <p>Привет, <span id="username" style="color:var(--pink)">Слушатель</span>!</p>
        <input type="text" id="search-input" class="search-box" placeholder="Артист или песня...">
        <button class="btn-search" onclick="startSearch()">Найти музыку</button>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        document.getElementById('username').innerText = tg.initDataUnsafe.user?.first_name || "Трейдер";
        function startSearch() {
            let q = document.getElementById('search-input').value;
            if (q.trim() !== "") {
                tg.sendData(q); 
                tg.close();
            }
        }
    </script>
</body>
</html>
