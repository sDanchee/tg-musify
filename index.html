<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musify Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --bg: #080808; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .container { width: 100%; max-width: 400px; }
        h1 { color: var(--neon); text-shadow: 0 0 15px var(--neon); letter-spacing: 5px; }
        .user-info { margin-bottom: 20px; color: var(--pink); font-weight: bold; }
        .search-box {
            width: 100%; background: #111; border: 1px solid #333;
            padding: 15px; border-radius: 15px; color: white; margin-bottom: 15px;
            box-sizing: border-box; outline: none;
        }
        .main-btn {
            width: 100%; background: linear-gradient(45deg, var(--neon), var(--pink));
            border: none; padding: 15px; border-radius: 15px;
            color: white; font-weight: bold; cursor: pointer;
        }
        .nav { display: flex; justify-content: space-around; margin-bottom: 20px; background: #111; padding: 10px; border-radius: 10px; }
        .nav div { font-size: 12px; color: #666; cursor: pointer; }
        .nav .active { color: var(--neon); }
    </style>
</head>
<body>
    <div class="container">
        <h1>MUSIFY</h1>
        <div class="user-info">Привет, <span id="user-name">Меломан</span>!</div>
        
        <div class="nav">
            <div class="active">ПОИСК</div>
            <div>МОЁ</div>
            <div>ТРЕНДЫ</div>
        </div>

        <input type="text" id="search-query" class="search-box" placeholder="Введите название...">
        <button class="main-btn" onclick="handleSearch()">НАЙТИ ТРЕК</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Имя пользователя
        document.getElementById('user-name').innerText = tg.initDataUnsafe?.user?.first_name || "Меломан";

        function handleSearch() {
            const query = document.getElementById('search-query').value;
            if (query.trim() !== "") {
                // Этот метод НЕ ЗАКРЫВАЕТ приложение, а открывает выбор чата для поиска
                // Или можно просто вызывать уведомление, но для реального поиска внутри 
                // нужно использовать API. Пока сделаем так, чтобы оно просто не закрывалось:
                
                tg.showConfirm("Найти " + query + "?", (ok) => {
                    if (ok) {
                        // Вместо sendData используем логику, которая просто оставляет окно
                        // Но данные боту полетят только через закрытие. 
                        // ЧТОБЫ НЕ ЗАКРЫВАЛОСЬ: нужно использовать внешний сервер (API).
                        tg.sendData(query); 
                    }
                });
            }
        }
    </script>
</body>
</html>
