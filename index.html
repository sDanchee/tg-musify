<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .user { color: var(--pink); font-weight: bold; margin-bottom: 20px; }
        .search-input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #111; color: white; margin-bottom: 10px; }
        .track-card { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: var(--neon); color: black; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #results { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>MUSIFY</h1>
    <div class="user">Привет, <span id="name">...</span>!</div>
    
    <input type="text" id="query" class="search-input" placeholder="Введите Eminem...">
    <button class="btn" style="width:100%" onclick="search()">ПОИСК</button>

    <div id="results"></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        document.getElementById('name').innerText = tg.initDataUnsafe?.user?.first_name || "Меломан";

        async function search() {
            const q = document.getElementById('query').value;
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = "Поиск...";

            // ЗАМЕНИ НА СВОЙ IP (Например: http://95.123.45.67:8000)
            const response = await fetch(`http://213.230.112.237:8000/search?q=${q}`);
            const data = await response.json();

            resDiv.innerHTML = "";
            data.results.forEach(track => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.innerHTML = `
                    <span>${track.title}</span>
                    <button class="btn" onclick="download('${track.id}')">DOWNLOAD</button>
                `;
                resDiv.appendChild(card);
            });
        }

        function download(id) {
            // Вот тут мы один раз шлем данные боту, чтобы он скинул файл, и закрываем
            tg.sendData("dl_" + id);
            tg.close();
        }
    </script>
</body>
</html>
